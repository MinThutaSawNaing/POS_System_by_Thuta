name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via SSH with Cloudflare Access
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.nationalcancercenter.click
          username: minthuta
          password: ${{ secrets.SSH_PASSWORD }}
          proxy_host: localhost
          proxy_port: 2222
          script: |
            cd /home/minthuta/Desktop/POS/POS_System_by_Thuta
            git pull origin main
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S systemctl restart pos.service

      - name: Setup Cloudflare Tunnel for SSH (Fallback)
        if: failure()
        run: |
          echo "Primary SSH method failed, trying alternative approach..."
          cloudflared access ssh --hostname ssh.nationalcancercenter.click --url localhost:2222 &
          sleep 5
          ssh -o "StrictHostKeyChecking=no" -o "UserKnownHostsFile=/dev/null" -p 2222 minthuta@localhost "cd /home/minthuta/Desktop/POS/POS_System_by_Thuta && git pull origin main && echo '${{ secrets.SSH_PASSWORD }}' | sudo -S systemctl restart pos.service"
name: Deploy to Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install cloudflared
      run: |
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb || sudo apt-get install -f -y
        
    - name: Deploy to Server via SSH
      env:
        SSH_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      run: |
        # Install sshpass for password-based SSH
        sudo apt-get update && sudo apt-get install -y sshpass
        
        # Run deployment commands through Cloudflare Tunnel
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no \
          -o ProxyCommand="cloudflared access ssh --hostname ssh.nationalcancercenter.click" \
          minthuta@ssh.nationalcancercenter.click \
          "cd /home/minthuta/Desktop/POS/POS_System_by_Thuta && git pull origin main && sudo systemctl restart pos.service"

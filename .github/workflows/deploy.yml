name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via SSH through Cloudflare Tunnel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.nationalcancercenter.click
          username: minthuta
          password: ${{ secrets.SSH_PASSWORD }}
          proxy_command: cloudflared access ssh --hostname %h
          script: |
            cd /home/minthuta/Desktop/POS/POS_System_by_Thuta
            git pull origin main
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S systemctl restart pos.service
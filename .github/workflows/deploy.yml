name: Deploy to Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install cloudflared
      run: |
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb || sudo apt-get install -f -y
        
    - name: Deploy to Server via SSH
      env:
        SSH_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass
        
        sshpass -p "$SSH_PASSWORD" ssh -tt -o StrictHostKeyChecking=no \
          -o ProxyCommand="cloudflared access ssh --hostname ssh.nationalcancercenter.click" \
          minthuta@ssh.nationalcancercenter.click \
          "rm -rf /home/minthuta/Desktop/POS/POS_System_by_Thuta && git clone --depth 1 https://github.com/MinThutaSawNaing/POS_System_by_Thuta.git /home/minthuta/Desktop/POS/POS_System_by_Thuta && sudo systemctl restart pos.service"
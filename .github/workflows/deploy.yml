name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Cloudflare Tunnel in Background
        run: |
          # This starts the tunnel on the GitHub runner so it creates a local "bridge"
          cloudflared access tcp --hostname ssh.nationalcancercenter.click --url localhost:2222 &
          sleep 5 # Give it a few seconds to wake up

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: localhost
          port: 2222
          username: minthuta
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/minthuta/Desktop/POS/POS_System_by_Thuta
            git pull origin main
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S systemctl restart pos.service
name: Push to Server
on:
  push:
    branches: [ "main" ] # Runs whenever you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. This tells the GitHub robot to look at your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. This installs the "Cloudflared" tool so the robot can find your server
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # 3. This is the magic part where it logs in and runs commands
      - name: SSH and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.nationalcancercenter.click
          username: minthuta
          password: ${{ secrets.SSH_PASSWORD }}
          # This line tells the robot HOW to connect through the tunnel
          proxy_command: cloudflared access ssh --hostname %h
          script: |
            cd /home/minthuta/Desktop/POS/POS_System_by_Thuta
            git pull origin main
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S systemctl restart pos.service
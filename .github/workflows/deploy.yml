name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via Direct Cloudflare SSH
        run: |
          # Create SSH key directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Disable host key checking for automation
          echo "Host *" >> ~/.ssh/config
          echo "    StrictHostKeyChecking no" >> ~/.ssh/config
          echo "    UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          
          # Execute deployment using the same method that works manually
          ssh -o "ProxyCommand=cloudflared access ssh --hostname %h" \
              minthuta@ssh.nationalcancercenter.click \
              "cd /home/minthuta/Desktop/POS/POS_System_by_Thuta && git pull origin main && echo '${{ secrets.SSH_PASSWORD }}' | sudo -S systemctl restart pos.service"